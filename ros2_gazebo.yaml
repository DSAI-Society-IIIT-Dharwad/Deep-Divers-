environment:
  name: ros2_gazebo
  params:
    goal: [5.0, 5.0]
    max_steps: 250
    command_duration: 0.2
    laser_sample_count: 4
    namespace: ""
    cmd_vel_topic: /cmd_vel
    odom_topic: /odom
    scan_topic: /scan
    reset_service: /reset_simulation

training:
  algorithm: ppo
  timesteps: 20000
  model_path: models/ppo_model_ros2
  checkpoint_path: models/checkpoints/ppo_ros2_checkpoint
  log_every: 1000
